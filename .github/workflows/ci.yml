# ABOUTME: CI — typecheck, tests, build, and a non-TTY CLI smoke on Linux and macOS.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Non-TTY invocations must fall back to --list and never crash.
      - run: node dist/cli.js --list
      - run: node dist/cli.js --memories
      - run: node dist/cli.js --json > /dev/null
      - run: node dist/cli.js --version
